# Blueprint Render — PDV CONNECT
# New → Blueprint → connecter ce repo
#
# À saisir manuellement à la création :
#   DB_PASSWORD, APP_KEY, MINIO_ROOT_USER (service MinIO)
#
# MinIO (pserv) et Cron : plan starter minimum (non disponibles en free).

envVarGroups:
  - name: pdvconnect-core
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: mysql-kapelo.alwaysdata.net
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: kapelo_pdvconnect
      - key: DB_USERNAME
        value: kapelo
      - key: DB_PASSWORD
        sync: false
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: BACKUP_ENABLED
        value: "true"
      - key: BACKUP_DISK
        value: backups
      - key: BACKUP_RETENTION_DAYS
        value: "7"
      - key: BACKUP_SCHEDULE_TIME
        value: "02:00"
      - key: BACKUP_MYSQLDUMP_PATH
        value: mysqldump
      - key: BACKUP_PREFIX
        value: pdvconnect
      - key: BACKUP_STALE_HOURS
        value: "48"
      - key: MINIO_ENDPOINT
        value: http://pdvconnect-minio:9000
      - key: MINIO_ACCESS_KEY
        fromService:
          name: pdvconnect-minio
          type: pserv
          envVarKey: MINIO_ROOT_USER
      - key: MINIO_SECRET_KEY
        fromService:
          name: pdvconnect-minio
          type: pserv
          envVarKey: MINIO_ROOT_PASSWORD
      - key: MINIO_BUCKET
        value: pdvconnect-backups
      - key: MINIO_REGION
        value: us-east-1
      - key: MINIO_USE_PATH_STYLE
        value: "true"
      - key: SECURITY_AUDIT_LOGGING_ENABLED
        value: "true"
      - key: SECURITY_IP_BLOCKING_ENABLED
        value: "true"
      - key: SECURITY_AUTO_BLOCK_THRESHOLD
        value: "10"
      - key: SECURITY_LOGIN_RATE_LIMIT_ENABLED
        value: "true"
      - key: SECURITY_LOGIN_RATE_LIMIT
        value: 10,1

services:
  # Stockage S3 compatible (réseau privé Render)
  - type: pserv
    name: pdvconnect-minio
    runtime: image
    plan: starter
    region: frankfurt
    image:
      url: docker.io/minio/minio:latest
    dockerCommand: server /data --address :9000 --console-address :9001
    envVars:
      - key: MINIO_ROOT_USER
        sync: false
      - key: MINIO_ROOT_PASSWORD
        generateValue: true
    disk:
      name: minio-data
      mountPath: /data
      sizeGB: 1

  - type: web
    name: pdvconnect
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /up
    envVars:
      - fromGroup: pdvconnect-core
      - key: APP_KEY
        sync: false
      - key: SMS_API_TOKEN
        generateValue: true

  # Laravel scheduler (backup quotidienne à 02:00 UTC)
  - type: cron
    name: pdvconnect-scheduler
    runtime: docker
    plan: starter
    region: frankfurt
    schedule: "* * * * *"
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: php artisan schedule:run
    envVars:
      - fromGroup: pdvconnect-core
      - key: APP_KEY
        sync: false
