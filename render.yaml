# Blueprint Render — PDV CONNECT (base MySQL AlwaysData)
# Déploiement : Dashboard Render → New → Blueprint → connecter ce repo
#
# IMPORTANT : saisir DB_PASSWORD manuellement à la création du Blueprint.

services:
  - type: web
    name: pdvconnect
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: mysql-kapelo.alwaysdata.net
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: kapelo_pdvconnect
      - key: DB_USERNAME
        value: kapelo
      - key: DB_PASSWORD
        sync: false
      # file/sync évite les 500 si tables cache/sessions absentes
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: SMS_API_TOKEN
        generateValue: true
