# Blueprint Render — PDV CONNECT (100 % gratuit, sans carte bancaire)
#
# Un seul service Web (plan free). Pas de MySQL/MinIO/Cron Render (plans payants).
# Base MySQL : AlwaysData (gratuit) — mot de passe à saisir une fois au 1er déploiement.
#
# New → Blueprint → connecter ce repo → saisir uniquement DB_PASSWORD (AlwaysData)
# Ensuite : git push = redéploiement auto

envVarGroups:
  - name: pdvconnect-core
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: mysql-kapelo.alwaysdata.net
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: kapelo_pdvconnect
      - key: DB_USERNAME
        value: kapelo
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: BACKUP_ENABLED
        value: "false"
      - key: SECURITY_AUDIT_LOGGING_ENABLED
        value: "true"
      - key: SECURITY_IP_BLOCKING_ENABLED
        value: "true"
      - key: SECURITY_AUTO_BLOCK_THRESHOLD
        value: "10"
      - key: SECURITY_LOGIN_RATE_LIMIT_ENABLED
        value: "true"
      - key: SECURITY_LOGIN_RATE_LIMIT
        value: 10,1
      - key: MOBILE_APK_VERSION
        value: "1.0"

services:
  - type: web
    name: pdvconnect
    runtime: docker
    plan: free
    region: frankfurt
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /up
    envVars:
      - fromGroup: pdvconnect-core
      - key: APP_KEY
        generateValue: true
      - key: DB_PASSWORD
        sync: false
      - key: SMS_API_TOKEN
        generateValue: true
