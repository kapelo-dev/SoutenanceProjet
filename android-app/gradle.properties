# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Utiliser JDK 17 pour le build (nécessaire : jlink pour androidJdkImage)
# Si le chemin ne convient pas sur ta machine, modifie-le ou supprime cette ligne et lance avec : JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64 ./build-apk.sh
org.gradle.java.home=/usr/lib/jvm/java-17-openjdk-amd64
