# Utiliser l'image publiée sur Docker Hub (sans build local).
# Remplace KAPELO_DEV par ton username Docker Hub.
# Usage : docker compose -f docker-compose.pull.yml up -d

services:
  app:
    image: kapelodev/pdvconnect-laravel:latest
    container_name: pdvconnect-app
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-laravel}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: database
      SESSION_DRIVER: database
    env_file:
      - .env
    volumes:
      - storage_logs:/var/www/html/storage/logs
      - storage_app:/var/www/html/storage/app
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: pdvconnect-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  storage_logs:
  storage_app:
