<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 36" fill="none" aria-label="PDV Connect">
  <!-- Icône avec design moderne et épuré -->
  <g>
    <!-- Forme principale - hexagone stylisé -->
    <path d="M16 8 L24 8 L28 16 L24 24 L16 24 L12 16 Z" fill="#FBBF24" opacity="0.9"/>
    <path d="M16 10 L22 10 L25 16 L22 22 L16 22 L13 16 Z" fill="white" opacity="0.2"/>
    
    <!-- Points de connexion -->
    <circle cx="20" cy="16" r="3" fill="white"/>
    
    <!-- Lignes de connexion -->
    <path d="M28 12 L34 8 M28 20 L34 24" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="34" cy="8" r="3.5" fill="#FBBF24"/>
    <circle cx="34" cy="24" r="3.5" fill="#FBBF24"/>
  </g>
  
  <!-- Texte PDV avec effet -->
  <text x="46" y="24" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#FBBF24" letter-spacing="-0.3">PDV</text>
  
  <!-- Texte CONNECT -->
  <text x="90" y="24" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#4B5563" letter-spacing="1">CONNECT</text>
</svg>
