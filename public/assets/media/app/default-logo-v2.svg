<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 40" fill="none" aria-label="PDV Connect">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon based on mini-logo-v2 -->
  <g>
    <!-- Main circle -->
    <circle cx="20" cy="20" r="8" fill="url(#logoGrad)"/>
    <circle cx="20" cy="20" r="5.5" fill="none" stroke="white" stroke-width="1.2" opacity="0.7"/>
    
    <!-- Connection lines -->
    <path d="M28 14 L36 10 M28 26 L36 30" stroke="#FBBF24" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Connection points -->
    <circle cx="36" cy="10" r="3.5" fill="url(#logoGrad)"/>
    <circle cx="36" cy="30" r="3.5" fill="url(#logoGrad)"/>
    
    <!-- Central bright point -->
    <circle cx="20" cy="20" r="2" fill="white" opacity="0.8"/>
  </g>
  
  <!-- PDV text -->
  <text x="48" y="26" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#FBBF24" letter-spacing="-0.5">PDV</text>
  
  <!-- CONNECT text -->
  <text x="98" y="26" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500" fill="#374151" letter-spacing="0.5">CONNECT</text>
  
  <!-- Decorative line under CONNECT -->
  <line x1="98" y1="30" x2="200" y2="30" stroke="#FBBF24" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>
