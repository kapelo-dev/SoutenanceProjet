# VPS 1 — PDV Connect : Laravel + MySQL + scheduler (sauvegardes planifiées)
#
# Prérequis : Docker + Docker Compose sur le VPS
#
# 1) cp .env.vps.example .env
# 2) Éditer .env (mots de passe, MINIO_* → IP du VPS 2) — APP_KEY auto si vide
# 3) docker compose -f docker-compose.vps.yml up -d --build
#    → migrations + db:seed auto (admin@pdvconnect.com / password123)
#
# Logs : docker compose -f docker-compose.vps.yml logs -f app

services:
  mysql:
    image: mysql:8.0
    container_name: pdvconnect-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD requis}
      MYSQL_DATABASE: ${DB_DATABASE:-pdvconnect}
      MYSQL_USER: ${DB_USERNAME:-pdvconnect}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requis}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - pdvconnect

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pdvconnect-app:latest
    container_name: pdvconnect-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-pdvconnect}
      DB_USERNAME: ${DB_USERNAME:-pdvconnect}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: ${CACHE_STORE:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pdvconnect

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: pdvconnect-app:latest
    container_name: pdvconnect-scheduler
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    env_file:
      - .env
    environment:
      RUN_MODE: scheduler
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-pdvconnect}
      DB_USERNAME: ${DB_USERNAME:-pdvconnect}
      DB_PASSWORD: ${DB_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pdvconnect

networks:
  pdvconnect:
    driver: bridge

volumes:
  mysql_data:
  app_storage:
  app_logs:
