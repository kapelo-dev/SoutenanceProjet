# Docker Compose production — Laravel + base MySQL externe (AlwaysData)
# Usage :
#   cp .env.example .env   # puis configurer DB_*
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pdvconnect-laravel:latest
    container_name: pdvconnect-app
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: database
      SESSION_DRIVER: database
    env_file:
      - .env
    volumes:
      - storage_logs:/var/www/html/storage/logs
      - storage_app:/var/www/html/storage/app
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  storage_logs:
  storage_app:
